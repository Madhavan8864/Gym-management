{% extends "base.html" %}

{% block page_title %}Gym Settings{% endblock %}

{% block content %}
<style>
    .settings-container {
        max-width: 500px;
        margin: 0 auto;
    }
    
    .settings-card {
        background: white;
        border-radius: 15px;
        padding: 30px;
        margin-bottom: 20px;
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
    }
    
    .form-group input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 8px;
    }
    
    .btn-save {
        background: #e94560;
        color: white;
        padding: 12px 30px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        width: 100%;
    }
    
    .info-text {
        font-size: 12px;
        color: #666;
        margin-top: 5px;
    }
</style>

<div class="settings-container">
    <div class="settings-card">
        <h2 style="margin-bottom: 20px;">⚙️ Gym Settings</h2>
        
        <form method="POST">
            <div class="form-group">
                <label>Gym Name</label>
                <input type="text" name="gym_name" value="Gym Tracker" placeholder="Enter gym name">
                <div class="info-text">This will appear on all pages</div>
            </div>
            
            <div class="form-group">
                <label>Default Monthly Fee (₹)</label>
                <input type="number" name="default_fee" value="1000" placeholder="Enter amount">
            </div>
            
            <div class="form-group">
                <label>Morning Start Time</label>
                <input type="time" name="morning_start" value="06:00">
            </div>
            
            <div class="form-group">
                <label>Morning End Time</label>
                <input type="time" name="morning_end" value="08:00">
            </div>
            
            <div class="form-group">
                <label>Evening Start Time</label>
                <input type="time" name="evening_start" value="18:00">
            </div>
            
            <div class="form-group">
                <label>Evening End Time</label>
                <input type="time" name="evening_end" value="20:00">
            </div>
            
            <button type="submit" class="btn-save">💾 Save Settings</button>
        </form>
    </div>
    
    <div class="settings-card">
        <h3>📊 System Info</h3>
        <div style="padding: 10px 0;">
            <p>Version: 1.0.0</p>
            <p>Database: SQLite</p>
            <p>Last Backup: Not performed yet</p>
        </div>
        <button class="btn-save" style="background: #6c757d;" onclick="alert('Backup feature coming soon!')">
            💾 Backup Database
        </button>
    </div>
</div>
{% endblock %}
