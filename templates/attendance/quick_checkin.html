{% extends "base.html" %}

{% block page_title %}Quick Check-in{% endblock %}

{% block content %}
<style>
    .quick-container {
        max-width: 500px;
        margin: 0 auto;
    }
    
    .search-box {
        width: 100%;
        padding: 15px;
        font-size: 16px;
        border: 2px solid #ddd;
        border-radius: 10px;
        margin-bottom: 20px;
    }
    
    .results-list {
        background: white;
        border-radius: 15px;
        overflow: hidden;
    }
    
    .result-item {
        padding: 15px;
        border-bottom: 1px solid #eee;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    
    .result-item:hover {
        background: #f8f9fa;
    }
    
    .btn-checkin {
        background: #2ecc71;
        color: white;
        padding: 5px 15px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }
    
    .member-name {
        font-weight: bold;
    }
    
    .member-info {
        font-size: 12px;
        color: #666;
    }
</style>

<div class="quick-container">
    <h2 style="margin-bottom: 20px;">Quick Check-in</h2>
    
    <input type="text" id="searchInput" class="search-box" 
           placeholder="🔍 Search by name or phone..." 
           onkeyup="searchMembers()">
    
    <div id="results" class="results-list">
        <div style="text-align: center; padding: 40px; color: #999;">
            Type to search members
        </div>
    </div>
</div>

<script>
    function searchMembers() {
        const searchTerm = document.getElementById('searchInput').value;
        
        if (searchTerm.length < 2) {
            document.getElementById('results').innerHTML = 
                '<div style="text-align: center; padding: 40px; color: #999;">Type at least 2 characters</div>';
            return;
        }
        
        fetch(`/api/members/search?q=${searchTerm}`)
            .then(response => response.json())
            .then(data => {
                if (data.length === 0) {
                    document.getElementById('results').innerHTML = 
                        '<div style="text-align: center; padding: 40px; color: #999;">No members found</div>';
                    return;
                }
                
                let html = '';
                data.forEach(member => {
                    html += `
                        <div class="result-item">
                            <div>
                                <div class="member-name">${member.name}</div>
                                <div class="member-info">${member.phone}</div>
                            </div>
                            <button class="btn-checkin" onclick="checkinMember(${member.id})">
                                ✅ Check In
                            </button>
                        </div>
                    `;
                });
                document.getElementById('results').innerHTML = html;
            });
    }
    
    function checkinMember(memberId) {
        fetch('/api/members/checkin', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({member_id: memberId})
        })
        .then(response => response.json())
        .then(data => {
            alert(data.message);
            if (data.success) {
                document.getElementById('searchInput').value = '';
                searchMembers();
            }
        });
    }
</script>
{% endblock %}
