{% extends "base.html" %}

{% block page_title %}Edit Time Slot{% endblock %}

{% block content %}
<style>
    .form-container {
        background: white;
        border-radius: 15px;
        padding: 30px;
        max-width: 500px;
        margin: 0 auto;
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
    }
    
    .form-group input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 8px;
    }
    
    .form-actions {
        display: flex;
        gap: 10px;
    }
    
    .btn-submit {
        background: #e94560;
        color: white;
        padding: 12px 30px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        flex: 1;
    }
    
    .btn-cancel {
        background: #6c757d;
        color: white;
        padding: 12px 30px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        text-decoration: none;
        text-align: center;
        flex: 1;
    }
</style>

<div class="form-container">
    <h2 style="margin-bottom: 25px;">✏️ Edit Time Slot</h2>
    
    <form method="POST">
        <div class="form-group">
            <label>Slot Name</label>
            <input type="text" name="slot_name" value="{{ slot[1] }}" required>
        </div>
        
        <div class="form-group">
            <label>Start Time</label>
            <input type="time" name="start_time" value="{{ slot[2] }}" required>
        </div>
        
        <div class="form-group">
            <label>End Time</label>
            <input type="time" name="end_time" value="{{ slot[3] }}" required>
        </div>
        
        <div class="form-group">
            <label>Maximum Capacity</label>
            <input type="number" name="max_capacity" value="{{ slot[4] }}" required>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn-submit">Update Slot</button>
            <a href="{{ url_for('view_slots') }}" class="btn-cancel">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
