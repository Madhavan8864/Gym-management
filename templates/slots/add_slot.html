{% extends "base.html" %}

{% block page_title %}Add Time Slot{% endblock %}

{% block content %}
<style>
    .form-container {
        background: white;
        border-radius: 15px;
        padding: 30px;
        max-width: 500px;
        margin: 0 auto;
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
    }
    
    .form-group input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 8px;
    }
    
    .btn-submit {
        background: #e94560;
        color: white;
        padding: 12px 30px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        width: 100%;
    }
</style>

<div class="form-container">
    <h2 style="margin-bottom: 25px;">Add Time Slot</h2>
    
    <form method="POST">
        <div class="form-group">
            <label>Slot Name</label>
            <input type="text" name="slot_name" required placeholder="e.g., Morning, Evening">
        </div>
        
        <div class="form-group">
            <label>Start Time</label>
            <input type="time" name="start_time" required>
        </div>
        
        <div class="form-group">
            <label>End Time</label>
            <input type="time" name="end_time" required>
        </div>
        
        <div class="form-group">
            <label>Maximum Capacity</label>
            <input type="number" name="max_capacity" value="20" required>
        </div>
        
        <button type="submit" class="btn-submit">Add Slot</button>
    </form>
</div>
{% endblock %}
