{% extends "base.html" %}

{% block page_title %}Monthly Collection{% endblock %}

{% block content %}
<style>
    .collection-container {
        background: white;
        border-radius: 15px;
        padding: 20px;
    }
    
    .total-card {
        background: linear-gradient(135deg, #e94560, #c73e56);
        color: white;
        border-radius: 15px;
        padding: 30px;
        text-align: center;
        margin-bottom: 20px;
    }
    
    .total-amount {
        font-size: 48px;
        font-weight: bold;
        margin: 10px 0;
    }
    
    .collection-table {
        width: 100%;
        background: white;
        border-radius: 15px;
        overflow: hidden;
    }
    
    .collection-table th {
        background: #1a1a2e;
        color: white;
        padding: 12px;
        text-align: left;
    }
    
    .collection-table td {
        padding: 10px;
        border-bottom: 1px solid #eee;
    }
</style>

<div class="collection-container">
    <div class="total-card">
        <h3>Monthly Collection Overview</h3>
        <div class="total-amount" id="totalAmount">₹0</div>
        <p>Select a month to view collection details</p>
    </div>
    
    <div class="filter-bar" style="margin-bottom: 20px; display: flex; gap: 10px;">
        <select id="monthSelect" style="padding: 10px; border-radius: 8px;">
            <option value="1">January</option>
            <option value="2">February</option>
            <option value="3">March</option>
            <option value="4">April</option>
            <option value="5">May</option>
            <option value="6">June</option>
            <option value="7">July</option>
            <option value="8">August</option>
            <option value="9">September</option>
            <option value="10">October</option>
            <option value="11">November</option>
            <option value="12">December</option>
        </select>
        <select id="yearSelect" style="padding: 10px; border-radius: 8px;">
            <option value="2024">2024</option>
            <option value="2025">2025</option>
            <option value="2026">2026</option>
        </select>
        <button onclick="viewCollection()" style="background: #e94560; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer;">View Collection</button>
    </div>
    
    <div id="collectionResult">
        <div style="text-align: center; padding: 40px; color: #999;">
            Select month and year to view collection
        </div>
    </div>
</div>

<script>
    function viewCollection() {
        const month = document.getElementById('monthSelect').value;
        const year = document.getElementById('yearSelect').value;
        window.location.href = `/reports/revenue?month=${month}&year=${year}`;
    }
</script>
{% endblock %}
